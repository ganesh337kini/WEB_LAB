<!-- Program 5:
Design a web page using CSS to demonstrate:
1. Different font styles
2. Background repeat property
3. Link styles
4. Visibility property
-->

<!DOCTYPE html>
<html>
<head>
    <title>CSS Demo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>1. Font Styles</h2>

<p class="normal">Normal Text</p>
<p class="italic">Italic Text</p>
<p class="bold">Bold Text</p>

<hr>

<h2>2. Link Styles</h2>

<a href="#">Sample Link</a>

<hr>

<h2>3. Visibility Property</h2>

<p>This text is visible.</p>
<p class="hide">This text is hidden.</p>

<hr>

<h2>4. Background Repeat</h2>

<div class="repeat"></div>

<h2>Background No Repeat</h2>

<div class="norepeat"></div>

</body>
</html>
