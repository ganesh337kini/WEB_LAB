```html
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<title>Average Marks</title>

<script>
function calculateAverage()
{
    let reg = document.getElementById("reg").value;
    let sub = document.getElementById("sub").value;
    let m1 = parseInt(document.getElementById("m1").value);
    let m2 = parseInt(document.getElementById("m2").value);
    let m3 = parseInt(document.getElementById("m3").value);

    if(reg=="" || sub=="" || isNaN(m1) || isNaN(m2) || isNaN(m3))
    {
        alert("Please fill all fields");
        return;
    }

    let min = Math.min(m1,m2,m3);
    let avg = (m1+m2+m3-min)/2;

    alert("Average Marks = " + avg);
}
</script>

<style>
body{
    text-align:center;
    font-family:Arial;
}

input{
    margin:5px;
    padding:5px;
}

button{
    padding:5px 10px;
}
</style>

</head>

<body>

<h2>Average Marks Calculator</h2>

Register Number:
<input type="text" id="reg"><br><br>

Subject Code:
<input type="text" id="sub"><br><br>

Marks 1:
<input type="number" id="m1"><br><br>

Marks 2:
<input type="number" id="m2"><br><br>

Marks 3:
<input type="number" id="m3"><br><br>

<button onclick="calculateAverage()">
Calculate Average
</button>

</body>
</html>
